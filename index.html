<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森林之美</title>
    <style>
        /* 整体页面样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
        }

        /* 半透明覆盖层，让文字更清晰 */
        .overlay {
            background-color: rgba(0, 50, 0, 0.6);
            min-height: 100vh;
            padding: 50px;
        }

        h1 {
            font-size: 3em;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000;
        }

        p {
            font-size: 1.2em;
            line-height: 1.8em;
            max-width: 800px;
            margin: 20px auto;
            text-align: center;
        }

        /* 简单按钮样式 */
        .btn {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 10px 20px;
            background-color: #2e8b57;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #1e5a3a;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9em;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>探索森林之美</h1>
        <p>
            森林，是地球上最神秘的生态系统之一。无论是高大的树木，潺潺的溪流，还是清晨的薄雾，都让人心旷神怡。
        </p>
        <p>
            在这里，你可以感受大自然的宁静，聆听鸟鸣，呼吸新鲜空气，放松身心，与大自然融为一体。
        </p>
        <a href="#" class="btn">了解更多</a>

        <footer>
            © 2026 森林主题网页
        </footer>
    </div>
</body>
</html>
